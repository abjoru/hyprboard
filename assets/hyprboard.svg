<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1d2e"/>
      <stop offset="100%" stop-color="#0f1119"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#64a0ff"/>
      <stop offset="100%" stop-color="#4080e0"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="80" fill="url(#bg)"/>

  <!-- Grid dots (subtle canvas feel) -->
  <g fill="#ffffff" opacity="0.06">
    <circle cx="128" cy="128" r="4"/>
    <circle cx="192" cy="128" r="4"/>
    <circle cx="256" cy="128" r="4"/>
    <circle cx="320" cy="128" r="4"/>
    <circle cx="384" cy="128" r="4"/>
    <circle cx="128" cy="192" r="4"/>
    <circle cx="192" cy="192" r="4"/>
    <circle cx="256" cy="192" r="4"/>
    <circle cx="320" cy="192" r="4"/>
    <circle cx="384" cy="192" r="4"/>
    <circle cx="128" cy="256" r="4"/>
    <circle cx="192" cy="256" r="4"/>
    <circle cx="320" cy="256" r="4"/>
    <circle cx="384" cy="256" r="4"/>
    <circle cx="128" cy="320" r="4"/>
    <circle cx="192" cy="320" r="4"/>
    <circle cx="256" cy="320" r="4"/>
    <circle cx="320" cy="320" r="4"/>
    <circle cx="384" cy="320" r="4"/>
    <circle cx="128" cy="384" r="4"/>
    <circle cx="192" cy="384" r="4"/>
    <circle cx="256" cy="384" r="4"/>
    <circle cx="320" cy="384" r="4"/>
    <circle cx="384" cy="384" r="4"/>
  </g>

  <!-- Back image frame (tilted slightly left) -->
  <g transform="rotate(-8, 210, 270)">
    <rect x="100" y="160" width="220" height="170" rx="8" fill="#232740" stroke="#3a3f5c" stroke-width="3"/>
    <!-- Mountain/landscape placeholder -->
    <polygon points="110,310 160,240 200,275 250,220 310,310" fill="#2a4a3a" opacity="0.7"/>
    <circle cx="270" cy="200" r="20" fill="#4a4a2a" opacity="0.5"/>
  </g>

  <!-- Middle image frame (straight) -->
  <g transform="rotate(3, 280, 240)">
    <rect x="170" y="130" width="210" height="160" rx="8" fill="#282c48" stroke="#4a5070" stroke-width="3"/>
    <!-- Abstract color blocks -->
    <rect x="180" y="140" width="90" height="70" rx="4" fill="#3a5a8a" opacity="0.6"/>
    <rect x="280" y="140" width="90" height="70" rx="4" fill="#5a3a6a" opacity="0.6"/>
    <rect x="180" y="220" width="190" height="60" rx="4" fill="#3a6a5a" opacity="0.5"/>
  </g>

  <!-- Front image frame (tilted right, with selection highlight) -->
  <g transform="rotate(5, 300, 310)">
    <rect x="190" y="220" width="230" height="180" rx="8" fill="#2e3354" stroke="url(#accent)" stroke-width="4"/>
    <!-- Simple landscape -->
    <polygon points="200,380 260,290 300,330 360,270 410,380" fill="#3a5a4a" opacity="0.7"/>
    <circle cx="360" cy="260" r="22" fill="#6a6a3a" opacity="0.6"/>

    <!-- Selection handles (blue squares at corners) -->
    <rect x="183" y="213" width="14" height="14" rx="2" fill="#64a0ff"/>
    <rect x="413" y="213" width="14" height="14" rx="2" fill="#64a0ff"/>
    <rect x="183" y="393" width="14" height="14" rx="2" fill="#64a0ff"/>
    <rect x="413" y="393" width="14" height="14" rx="2" fill="#64a0ff"/>

    <!-- Rotation handle -->
    <line x1="305" y1="213" x2="305" y2="190" stroke="#64a0ff" stroke-width="3"/>
    <circle cx="305" cy="185" r="7" fill="#64a0ff"/>
  </g>

  <!-- Text label attached to front image -->
  <g transform="rotate(5, 300, 310)">
    <rect x="210" y="405" width="80" height="24" rx="4" fill="#64a0ff" opacity="0.9"/>
    <text x="250" y="422" font-family="sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">Label</text>
  </g>
</svg>
